name: Daily Script Scrape

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Run scraper
        run: uv run python scraper.py

      - name: Commit new scripts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/
          git diff --staged --quiet || (git commit -m "Add new scripts $(date -u +%Y-%m-%d)" && git push)
